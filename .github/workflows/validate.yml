name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Validate skill structure
        run: ./scripts/validate.sh
